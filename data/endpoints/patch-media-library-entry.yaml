title: Patch a Media Library Entry
endpointId: patch-media-library-entry

apiVersionConstraints:
  gte: 2026-03

history:
  - release: release-2026-05
    description: Added `addUsageLogEntry`, `updateUsageLogEntry` and `removeUsageLogEntry` operations.
  - release: release-2026-03
    description: Added `preserveUpdatedAt` parameter. When set to `true`, the entry's `updated_at` timestamp is not modified. This is useful for imports and migrations where the original timestamps should be preserved.
  - release: release-2026-01
    description: Added `unrevokeAsset` operation.<br>
      Added the `note` property to be used with the `revokeAsset` operation.
  - release: release-2024-01
    description: Added `removeAsset` operation.
  - release: release-2022-03
    description: Added `replaceAsset` operation.
  - release: release-2020-12
    description: Initial support.

description: |
  Patch a Media Library Entry by its `id`.

useCases: |
  - Enhancing MediaLibraryEntries. For example, update the metadata after transcoding a video or analyzing the media with an external service.
  - When having a separate DAM - update Livingdocs Media Library Entry

scopes: public-api:write
query: |
  ACCESS_TOKEN=ey1234
  curl -k -X PATCH "https://server.livingdocs.io/api/:apiVersion/mediaLibrary/{id}" \
    -H "Content-Type: application/json" \
    -H "Authorization: Bearer $ACCESS_TOKEN"
endpoint:
  method: PATCH
  path: /api/:apiVersion/mediaLibrary/{id}
parameters:
  - name: version
    type: string
    required: false
    notes: 'current mediaLibraryEntry version. When set on update the version is checked.'
  - name: preserveUpdatedAt
    type: boolean
    required: false
    notes: |
      {{< added-in "release-2026-03" block >}}

      When set to `true`, the entry's `updated_at` timestamp is not modified by the patch operation. By default (`false`), `updated_at` is set to the current time.

      This is useful for imports and migrations where the original timestamps should be preserved to maintain correct sort order.
  - name: patches
    type: array
    required: true
    notes: |
      An array of patches to execute. Each entry is an object with the following keys:
      - **operation**
        - `setMetadataProperty`
        - `archive`
        - `replaceAsset`
        - `removeAsset`
        - `revokeAsset`
        - `unrevokeAsset` ({{< added-in "release-2026-01" >}})
        - `addUsageLogEntry` ({{< added-in "release-2026-05" >}})
        - `updateUsageLogEntry` ({{< added-in "release-2026-05" >}})
        - `removeUsageLogEntry` ({{< added-in "release-2026-05" >}})
      - **propertyName** string of the propertyName (only for setMetadataProperty)
      - **value** string or object for the new value. If set to null or value is not set it will remove the property for setMetadataProperty. **required** for replaceAsset operation.
      - **locale** string of the asset to be removed (only in multilingual setups for removeAsset)
      - **note** optional string with a maximum length of 200 characters. Only supported by the `revokeAsset` operation. ({{< added-in "release-2026-01" >}})
      - **usageLogEntryId** required string to identify the usage log entry to operate on. Only supported by the `updateUsageLogEntry` and `removeUsageLogEntry` operations. ({{< added-in "release-2026-05" >}})
      - **oldValue** optional object containing the previous usage log entry which must match for the operation to proceed. Only supported by the `updateUsageLogEntry` operation. ({{< added-in "release-2026-05" >}})

example_request: |
  {
    "version": "1",
    // When true, the entry's updated_at timestamp is preserved
    "preserveUpdatedAt": true,
    "patches": [
      {
        // update a single metadata property
        "operation": "setMetadataProperty",
        "propertyName": "title",
        "value": "updated title"
      },
      {
        // replace the asset
        "operation": "replaceAsset",
        "value": {
          // the file with this key should exist in the configured storage
          key: '2021/11/23/my-new-file.png',
          url: 'https://example.com/my-new-file.png',
          size: 10000,
          width: 1000,
          height: 800,
          filename: 'my-new-file.png',
          mimeType: 'image/png'
        }
      },
      {
        // revoke the asset
        "operation": "revokeAsset",
        "note": "Case #1"
      },
      {
        // unrevoke the asset
        "operation": "unrevokeAsset"
      },
      {
        // archives a Media Library Entry
        "operation": "archive"
      },
      {
        // removes a translated asset (the default locale asset cannot be removed)
        "operation": "removeAsset",
        "locale": "en"
      },
      // add a usage log entry
      {
        operation: 'addUsageLogEntry',
        value: {
          state: 'pending', // Optional 'pending' or 'confirmed' (default: 'pending')
          purpose: 'print', // Required handle of usage log purpose
          publicationDate: '2026-05-01T11:00:00.000Z', // Required when state is 'confirmed'
          url: 'http://localhost', // Optional link to external editor or delivery
          params: {} // Any value for params defined in the `paramsSchema` of the selected purpose
        }
      },
      // update a usage log entry
      {
        operation: 'updateUsageLogEntry',
        usageLogEntryId: 'g1x419UgQSS5',
        value: {
          state: 'confirmed', // Required for updates
          purpose: 'print',
          publicationDate: '2026-05-01T11:00:00.000Z',
          url: 'http://localhost',
          params: {
            medium: 'Paper'
          }
        },
        oldValue: {} // Optional expected state condition
      },
      // remove a usage log entry
      {
        operation: 'removeUsageLogEntry',
        usageLogEntryId: 'g1x419UgQSS5'
      }
    ]
  }

responses:
  - code: '200'
    endpoint: /api/:apiVersion/mediaLibrary/{id}
    body: |
      {
        "status": 200
      }
  - code: '400'
    endpoint: /api/:apiVersion/mediaLibrary/{id}
    body: |
      {
        "status": 400,
        "error": "Bad Request",
        "error_details": {
          "patches.0.operation": "No enum match for: \"notExistingOperation\""
        }
      }
  - code: '404'
    endpoint: /api/:apiVersion/mediaLibrary/{id}
    body: |
      {
        "status": 404,
        "error": "Not Found",
        "error_details": {
          "name": "NotFound",
          "message": "MediaLibrary Entry does not exist (id: 'yLBGtTjWN4ba')"
        }
      }
  - code: '409'
    endpoint: /api/:apiVersion/mediaLibrary/{id}
    body: |
      {
        "status": 409,
        "error": "Conflict",
        "error_details": {
          "name": "Conflict",
          "message": "Version: Expected 36 to be equal to 1"
        }
      }

openapi:
  security:
    - bearerAuth:
        - public-api:write
  tags:
    - Media Library
  operationId: updateMediaLibraryEntry
  summary: Patch a Single Media Library Entry
  description: Patch a Media Library Entries by its `id`
  parameters:
    - name: id
      description: Id of a Media Library entry
      in: path
      required: true
      schema:
        type: string
  requestBody:
    content:
      application/json:
        schema:
          type: object
          properties:
            version:
              type: number
            preserveUpdatedAt:
              type: boolean
              default: false
              description: When true, the entry's updated_at timestamp is not modified.
            patches:
              type: array
              items:
                type: object
                properties:
                  operation:
                    type: string
        examples:
          post:
            value:
              version: 1
              patches:
                - operation: setMetadataProperty
                  propertyName: title
                  value: updated title
                - operation: replaceAsset
                  value:
                    key: 2021/11/23/my-new-file.png
                    url: 'https: //example.com/my-new-file.png'
                    size: 10000
                    width: 1000
                    height: 800
                    filename: my-new-file.png
                    mimeType: image/png
                - operation: revokeAsset
                  note: 'Case #1'
                - operation: unrevokeAsset
                - operation: archive
                - operation: removeAsset
                  locale: en
                - operation: addUsageLogEntry
                  value:
                    state: 'pending'
                    purpose: 'print'
                    publicationDate: '2026-05-01T11:00:00.000Z'
                    url: 'http://localhost'
                    params: {}
                - operation: updateUsageLogEntry
                  usageLogEntryId: g1x419UgQSS5
                  value:
                    state: 'confirmed'
                    purpose: 'print'
                    publicationDate: '2026-05-01T11:00:00.000Z'
                    url: 'http://localhost'
                    params:
                      medium: 'Paper'
                  oldValue: {}
                - operation: removeUsageLogEntry
                  usageLogEntryId: g1x419UgQSS5
  responses:
    '200':
      description: ok
